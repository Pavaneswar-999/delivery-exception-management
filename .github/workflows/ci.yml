name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint HTML
        run: npx htmlhint index.html

      - name: Lint CSS
        run: npx stylelint styles.css

      - name: Lint JavaScript
        run: npx eslint script.js

      - name: Validate accessibility (axe-core)
        run: |
          npx http-server -p 8080 -s &
          sleep 3
          npx axe-cli http://localhost:8080 --save axe-results.json --exit
        env:
          CI: true

      - name: Upload accessibility results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: axe-results.json

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Lighthouse CI
        run: |
          npx http-server -p 8080 -s &
          sleep 3
          npx lighthouse http://localhost:8080 \
            --output=json \
            --output-path=./lighthouse-report.json \
            --ci \
            --budget-path=./lighthouse-budget.json
        env:
          CI: true

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report.json

  deploy-preview:
    name: Deploy Preview
    needs: [lint-and-test, lighthouse]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages Preview
        uses: peaceiris/actions-gh-pages@v3
        if: github.repository_owner == 'Pavaneswar-999'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: preview/pr-${{ github.event.number }}
          keep_files: true
          force_orphan: true
